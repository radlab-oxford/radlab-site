<p style="margin-top:64px;font-size:12px;color:var(--grey)"><a href="accessibility.html">accessibility</a> · <a href="privacy.html">privacy</a></p>
<script>
  // Mode-shape bloom, after Nigina: a lattice of dots driven by slowly
  // morphing standing-wave modes. Flower-like patterns emerge, fragment,
  // and dissolve as the mode numbers drift - Chladni figures in slow bloom.
  (function () {
    const cv = document.getElementById('bloom');
    const ctx = cv.getContext('2d');
    const GREY = '138,138,138';
    const INK = '16,16,16';
    const TEAL = '95,199,174';
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    let W, H, DPR, pts = [];
    const GAP = 16;                            // lattice spacing

    function resize() {
      DPR = Math.min(devicePixelRatio || 1, 2);
      W = innerWidth; H = innerHeight;
      cv.width = W * DPR; cv.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      pts = [];
      for (let x = GAP / 2; x < W; x += GAP)
        for (let y = GAP / 2; y < H; y += GAP)
          pts.push([x, y]);
    }
    resize();
    addEventListener('resize', () => { resize(); if (reduced) draw(40000); });

    // smooth random field: 3D value noise (x, y, slow time).
    // no geometry at all - just organic patches that grow, merge, and dissolve.
    function h3(x, y, z) {
      const s = Math.sin(x * 127.1 + y * 311.7 + z * 74.7) * 43758.5453;
      return s - Math.floor(s);
    }
    function smooth(v) { return v * v * (3 - 2 * v); }
    function noise(x, y, z) {
      const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
      const xf = smooth(x - xi), yf = smooth(y - yi), zf = smooth(z - zi);
      let v = 0;
      for (let dz = 0; dz <= 1; dz++)
        for (let dy = 0; dy <= 1; dy++)
          for (let dx = 0; dx <= 1; dx++)
            v += h3(xi + dx, yi + dy, zi + dz) *
                 (dx ? xf : 1 - xf) * (dy ? yf : 1 - yf) * (dz ? zf : 1 - zf);
      return v;                                // 0..1
    }

    // lightning: jagged teal lines that occasionally connect two teal pixels,
    // appearing at full strength and fading away over a second or two
    const bolts = [];
    function updateBolts(t, tealPts) {
      // spawn: several attempts per tick so strict routing still finds paths
      if (!reduced && bolts.length < 4 && tealPts.length > 4 && Math.random() < 0.08) {
        for (let attempt = 0; attempt < 8; attempt++) {
          // chain 4-5 teal pixels with horizontal/vertical segments only,
          // alternating direction each hop - circuit-board traces
          const chain = [tealPts[(Math.random() * tealPts.length) | 0]];
          const hops = 3 + ((Math.random() * 2) | 0);      // 3 or 4 hops -> 4 or 5 pixels
          let dir = Math.random() < 0.5 ? 'h' : 'v';
          for (let k = 0; k < hops; k++) {
            // rarely, a hop goes 45-degree diagonal along the lattice
            const useDir = Math.random() < 0.13 ? 'd' : dir;
            const last = chain[chain.length - 1];
            const cands = tealPts.filter(p => {
              if (chain.includes(p)) return false;
              const dx = Math.abs(p[0] - last[0]), dy = Math.abs(p[1] - last[1]);
              if (useDir === 'h') return dy === 0 && dx > 32 && dx < 380;
              if (useDir === 'v') return dx === 0 && dy > 32 && dy < 380;
              return dx === dy && dx > 32 && dx < 260;     // exact 45-degree diagonal
            });
            if (!cands.length) break;
            chain.push(cands[(Math.random() * cands.length) | 0]);
            dir = dir === 'h' ? 'v' : 'h';                 // orthogonal rhythm continues
          }
          if (chain.length >= 4) {
            bolts.push({ pts: chain, born: t, life: 2600 + Math.random() * 2400 });
            break;                                         // one new trace per tick
          }
        }
      }
      // render + retire
      for (let i = bolts.length - 1; i >= 0; i--) {
        const b = bolts[i], age = t - b.born;
        if (age > b.life) { bolts.splice(i, 1); continue; }
        const alpha = Math.pow(1 - age / b.life, 1.6) * 0.85;   // sudden birth, gradual fade
        ctx.strokeStyle = `rgba(38,196,157,${alpha})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(b.pts[0][0], b.pts[0][1]);
        for (const p of b.pts) ctx.lineTo(p[0], p[1]);
        ctx.stroke();
        // the connected pixels swell while the line lives, shrinking as it fades
        const hs = (4 + 4 * (alpha / 0.85)) / 2;                // 8px down to 4px
        ctx.fillStyle = `rgba(38,196,157,${Math.min(1, alpha * 1.3)})`;
        for (const p of b.pts) ctx.fillRect(p[0] - hs, p[1] - hs, hs * 2, hs * 2);
        // each segment reports its length in orange, sitting just off the line
        ctx.fillStyle = `rgba(232,114,0,${Math.min(1, alpha * 1.3)})`;
        ctx.font = '9px "IBM Plex Mono", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let k = 0; k < b.pts.length - 1; k++) {
          const [x1, y1] = b.pts[k], [x2, y2] = b.pts[k + 1];
          const L = Math.hypot(x2 - x1, y2 - y1);
          const ox = -(y2 - y1) / L * 9, oy = (x2 - x1) / L * 9;  // perpendicular offset
          ctx.fillText(Math.round(L), (x1 + x2) / 2 + ox, (y1 + y2) / 2 + oy);
        }
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);
      const z = t * 0.00006;                   // slow evolution
      const tealPts = [];                      // teal pixels visible this frame
      for (const [x, y] of pts) {
        // two octaves of noise, mapped to -1..1
        const a = ((noise(x / 260, y / 260, z) * 0.7 +
                    noise(x / 90, y / 90, z * 1.7) * 0.3) - 0.5) * 2;
        const amp = Math.abs(a);
        if (amp < 0.45) continue;              // only the stronger regions render: sparser field
        // a sparse few cells display their own value as a digit instead of a pixel;
        // which cells do so drifts slowly, so numbers surface and sink in the field
        const h = ((x * 2654435761 ^ y * 40503) >>> 0) % 1000;
        const bucket = Math.floor(t * 0.0001 + h);
        if ((h + bucket) % 17 === 0) {
          const d = Math.min(9, Math.floor(amp * 10));
          ctx.fillStyle = `rgba(38,196,157,${0.6 + amp * 0.4})`;
          ctx.font = '9px "IBM Plex Mono", monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(d, x, y);
          continue;
        }
        // pixel: square, size quantized to whole steps so it grows in jumps
        const s = Math.ceil(amp * 3) * 2.5;    // 2.5, 5, or 7.5 px
        if (h % 11 === 0) {                    // a scatter of teal pixels (~9%)
          ctx.fillStyle = `rgba(38,196,157,${0.55 + amp * 0.45})`;
          tealPts.push([x, y]);
        } else {
          // wide tonal spread: n remaps the visible amplitude range to 0..1,
          // positive phase sweeps from pale grey to near-black, negative stays whisper-pale
          const n = (amp - 0.45) / 0.55;
          ctx.fillStyle = a > 0 ? `rgba(${INK},${0.04 + Math.pow(n, 1.6) * 0.34})`
                                : `rgba(${INK},${0.015 + n * 0.05})`;
        }
        ctx.fillRect(x - s / 2, y - s / 2, s, s);
      }
      updateBolts(t, tealPts);
    }

    if (reduced) { draw(40000); return; }      // one still frame, no motion
    let raf;
    function loop(t) { draw(t); raf = requestAnimationFrame(loop); }
    raf = requestAnimationFrame(loop);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) cancelAnimationFrame(raf);
      else raf = requestAnimationFrame(loop);
    });
  })();
</script>
